<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paint Together</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Righteous&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ===================== LANDING SCREEN ===================== -->
    <div id="landingScreen" class="landing-screen">
        <canvas id="splashCanvas" class="splash-canvas"></canvas>
        <button id="darkToggleBtn" class="dark-toggle" title="Toggle dark mode">🌙</button>
        <div class="landing-card">
            <div class="landing-logo">🎨</div>
            <h1 class="landing-title">Paint Together</h1>
            <p class="landing-subtitle">Draw. Collaborate. Create.</p>
            <div class="landing-form">
                <div class="input-group">
                    <label for="usernameInput">Your Name</label>
                    <input type="text" id="usernameInput" class="landing-input"
                        placeholder="Enter your name..." maxlength="20" autocomplete="off">
                </div>
                <div class="form-divider"><span>choose an option</span></div>
                <button id="landingCreateBtn" class="btn-create">
                    <span>✦</span> Create New Room
                </button>
                <div class="or-sep"><span>or join existing</span></div>
                <div class="join-row">
                    <input type="text" id="roomCodeInput" class="landing-input room-code-input"
                        placeholder="Room code..." maxlength="8" autocomplete="off">
                    <button id="landingJoinBtn" class="btn-join">Join →</button>
                </div>
                <p id="landingError" class="landing-error"></p>
            </div>
        </div>
    </div>

    <!-- ===================== APP SCREEN ===================== -->
    <div id="appScreen" class="app-screen" style="display:none; opacity:0;">

        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <span class="app-logo">🎨</span>
                <span class="app-title">Paint Together</span>
            </div>

            <!-- CENTER: only Room Code + Members button -->
            <div class="header-center" id="roomInfo" style="visibility:hidden;">
                <span class="room-label">Room:</span>
                <strong id="roomId" class="room-code"></strong>

                <!-- Members button + dropdown -->
                <div class="members-wrapper">
                    <button id="membersBtn" class="members-btn">
                        👥 Members <span id="userCount">1</span>
                        <span class="members-chevron">▾</span>
                    </button>
                    <div id="membersDropdown" class="members-dropdown">
                        <div class="members-dropdown-header">Room Members</div>
                        <ul id="membersList" class="members-list"></ul>
                    </div>
                </div>
            </div>

            <div class="header-right">
                <button id="copyLinkBtn" class="copy-btn">🔗 Copy Link</button>
                <span id="myNameBadge" class="my-name-badge"></span>
                <button id="exitRoomBtn" class="exit-room-btn" title="Leave room">🚪 Exit</button>
                <button id="darkToggleBtnApp" class="dark-toggle-app" title="Toggle dark mode">🌙</button>
            </div>
        </header>

        <!-- Toolbar -->
        <div class="toolbar">
            <div class="control-group">
                <button id="brushBtn" class="tool-btn active">✏️ Brush</button>
                <button id="eraserBtn" class="tool-btn">⬜ Eraser</button>
            </div>
            <div class="control-group color-palette-group">
                <label>Colors:</label>
                <div class="color-palette" id="colorPalette"></div>
                <button id="customColorBtn" class="custom-color-btn" title="Custom color">+</button>
            </div>
            <div class="control-group">
                <label for="brushSize">Size:</label>
                <input type="range" id="brushSize" min="1" max="50" value="5">
                <span id="brushSizeValue">5px</span>
            </div>
            <div class="control-group toolbar-actions">
                <button id="clearBtn" class="action-btn clear-btn">🗑️ Clear</button>
                <button id="downloadBtn" class="action-btn download-btn">💾 Save</button>
                <button id="undoBtn" class="action-btn undo-btn" disabled>↩ Undo</button>
                <button id="redoBtn" class="action-btn redo-btn" disabled>↪ Redo</button>
            </div>
        </div>

        <!-- Canvas -->
        <div class="canvas-container">
            <canvas id="canvas" width="1000" height="600"></canvas>
            <div id="cursorOverlay" class="cursor-overlay"></div>
        </div>

        <!-- Chat Button -->
        <button id="chatBtn" class="chat-btn">
            💬
            <span id="chatNotification" class="chat-notification"></span>
        </button>

        <!-- Chat Popup -->
        <div id="chatPopup" class="chat-popup">
            <div class="chat-popup-header"><span>💬 Chat</span></div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-container">
                <input type="text" id="chatInput" class="chat-input" placeholder="Type a message..." maxlength="200">
                <button id="chatSendBtn" class="chat-send-btn">Send</button>
            </div>
        </div>

    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <!-- Kick Confirmation Modal -->
    <div id="kickModal" class="kick-modal">
        <div class="kick-modal-content">
            <div class="kick-modal-icon">✕</div>
            <h3>Kick Member?</h3>
            <p id="kickModalText">Remove this user from the room?</p>
            <div class="kick-modal-buttons">
                <button id="kickCancelBtn" class="picker-btn cancel-btn">Cancel</button>
                <button id="kickConfirmBtn" class="picker-btn kick-confirm-btn">Kick</button>
            </div>
        </div>
    </div>

    <!-- Color Picker Modal -->
    <div id="colorPickerModal" class="color-picker-modal">
        <div class="color-picker-content">
            <h3>Choose Custom Color</h3>
            <input type="color" id="colorPicker" value="#000000">
            <div class="color-picker-buttons">
                <button id="colorPickerCancel" class="picker-btn cancel-btn">Cancel</button>
                <button id="colorPickerOk" class="picker-btn ok-btn">OK</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
